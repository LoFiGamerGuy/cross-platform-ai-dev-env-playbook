# Starship config — cross-platform prompt
# Place at ~/.config/starship.toml
#
# Reference config from the cross-platform-ai-dev-env-playbook.
# Tweak to taste; the structure here is the load-bearing part.

# Format the overall prompt
format = """
$directory\
$git_branch\
$git_status\
$python\
$nodejs\
$rust\
$golang\
$cmd_duration\
$line_break\
$character"""

# Don't add a newline at the start of the prompt
add_newline = false

# Directory: show only the last 3 components, abbreviate home as ~
[directory]
truncation_length = 3
truncate_to_repo = false
home_symbol = "~"
read_only = " 🔒"
style = "bold cyan"

# Git branch: show name with a small icon
[git_branch]
symbol = " "
style = "bold purple"

# Git status: show concise indicators
[git_status]
format = '([\[$all_status$ahead_behind\]]($style) )'
style = "bold yellow"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
modified = "✱"
staged = "+"
untracked = "?"
deleted = "✘"
renamed = "→"

# Runtime versions: only show when in a project that uses them
[python]
symbol = "🐍 "
format = '[$symbol$pyenv_prefix($version )(\($virtualenv\) )]($style)'
style = "bold green"
detect_extensions = ["py"]
detect_files = ["pyproject.toml", "requirements.txt", ".python-version", ".mise.toml"]

[nodejs]
symbol = " "
format = '[$symbol($version )]($style)'
style = "bold green"
detect_extensions = ["js", "ts", "mjs"]
detect_files = ["package.json", ".nvmrc", ".node-version", ".mise.toml"]

[rust]
symbol = "🦀 "
format = '[$symbol($version )]($style)'
style = "bold red"

[golang]
symbol = " "
format = '[$symbol($version )]($style)'
style = "bold cyan"

# Command duration: show only for slow commands
[cmd_duration]
min_time = 2_000  # ms
format = "[took $duration]($style) "
style = "bold yellow"

# Character: prompt indicator
[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold green)"

# Things you might want to disable for noise reduction
[hostname]
disabled = true   # you know which machine you're on

[username]
disabled = true   # you know who you are

[battery]
disabled = true   # use your OS for battery info, not your prompt

[time]
disabled = true   # use your terminal multiplexer status bar for time

[aws]
disabled = false  # show AWS profile when set
format = '[$symbol(profile: "$profile" )(region: "$region" )]($style)'
style = "bold orange"
symbol = "🅰  "

[gcloud]
disabled = false
format = '[$symbol$active(\($project\))]($style)'
style = "bold blue"
symbol = "☁️  "
