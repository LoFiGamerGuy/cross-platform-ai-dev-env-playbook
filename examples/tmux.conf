# tmux config — cross-platform multiplexer
# Place at ~/.config/tmux/tmux.conf or ~/.tmux.conf
#
# Reference config from the cross-platform-ai-dev-env-playbook.

# ─── General ────────────────────────────────────────────────────────────────

# Use Ctrl-a as prefix instead of Ctrl-b (closer to home row, doesn't conflict with vim/emacs)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Improve color support
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# Faster command sequences
set -s escape-time 10

# Increase scrollback
set -g history-limit 50000

# Enable mouse mode (yes really; it doesn't break copy-paste)
set -g mouse on

# Start window/pane numbering at 1 (0 is far from your fingers)
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# ─── Key bindings ───────────────────────────────────────────────────────────

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

# Sane split keys (uses current pane's directory)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window in current path
bind c new-window -c "#{pane_current_path}"

# Vi-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Quad layout: 2x2 panes (one keystroke!)
bind Q split-window -h -c "#{pane_current_path}" \; \
       split-window -v -c "#{pane_current_path}" \; \
       select-pane -L \; \
       split-window -v -c "#{pane_current_path}" \; \
       select-pane -U

# Triple vertical
bind T split-window -h -c "#{pane_current_path}" \; \
       split-window -h -c "#{pane_current_path}" \; \
       select-layout even-horizontal

# Dual horizontal
bind D split-window -v -c "#{pane_current_path}"

# Synchronize panes (toggle)
bind y setw synchronize-panes \; display "Sync: #{?pane_synchronized,ON,OFF}"

# ─── Copy mode ──────────────────────────────────────────────────────────────

# Vi keys in copy mode
setw -g mode-keys vi

# Copy with v + y like vim
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# ─── Status bar ─────────────────────────────────────────────────────────────

# Position
set -g status-position bottom
set -g status-justify left

# Refresh every 5 seconds
set -g status-interval 5

# Style
set -g status-style "bg=default,fg=white"
set -g status-left-length 40
set -g status-right-length 100

# Left: session name
set -g status-left "#[fg=green,bold][#S] "

# Right: cwd, time, hostname
set -g status-right "#[fg=cyan]#{pane_current_path} #[fg=yellow]| %Y-%m-%d %H:%M #[fg=magenta]| #h"

# Window status format
setw -g window-status-format " #I:#W "
setw -g window-status-current-format "#[fg=black,bg=cyan,bold] #I:#W "

# Pane border
set -g pane-border-style "fg=brightblack"
set -g pane-active-border-style "fg=cyan"

# ─── Plugin manager (TPM) ────────────────────────────────────────────────────
# Optional. If you don't use TPM, remove this section.

# List of plugins
# set -g @plugin 'tmux-plugins/tpm'
# set -g @plugin 'tmux-plugins/tmux-sensible'
# set -g @plugin 'tmux-plugins/tmux-resurrect'   # save/restore sessions
# set -g @plugin 'tmux-plugins/tmux-continuum'   # auto-save sessions

